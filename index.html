<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">

    <!-- Setup view -->
    <div id="setupView">
      <div class="card-header">
        <div class="label-pill">Countdown</div>
        <div class="timer-title" id="titleDisplay" title="Click to edit">Untitled Timer</div>
        <input class="title-input" id="titleInput" type="text" maxlength="40" placeholder="Name your timer..." />
      </div>

      <div class="setup-section">
        <div class="setup-label">Set duration</div>
        <div class="duration-inputs">
          <div class="duration-field">
            <label for="inputDays">Days</label>
            <input type="number" id="inputDays" min="0" max="999" value="0" />
          </div>
          <div class="duration-field">
            <label for="inputHours">Hours</label>
            <input type="number" id="inputHours" min="0" max="23" value="0" />
          </div>
          <div class="duration-field">
            <label for="inputMinutes">Minutes</label>
            <input type="number" id="inputMinutes" min="0" max="59" value="5" />
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="startBtn">Start</button>
      </div>
    </div>

    <!-- Timer view -->
    <div id="timerView" class="hidden">
      <div class="card-header">
        <div class="label-pill">Countdown</div>
        <div class="timer-name" id="timerName">Untitled Timer</div>
      </div>

      <div class="countdown-grid">
        <div class="unit-block">
          <div class="digit-roller" id="days"><div class="digit-inner">00</div></div>
          <span class="unit-label">Days</span>
        </div>
        <div class="unit-block">
          <div class="digit-roller" id="hours"><div class="digit-inner">00</div></div>
          <span class="unit-label">Hours</span>
        </div>
        <div class="unit-block">
          <div class="digit-roller" id="minutes"><div class="digit-inner">00</div></div>
          <span class="unit-label">Mins</span>
        </div>
        <div class="unit-block">
          <div class="digit-roller" id="seconds"><div class="digit-inner">00</div></div>
          <span class="unit-label">Secs</span>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="progressLabel">0% elapsed</span>
          <span id="progressTime">–</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="status-text">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Ready</span>
      </div>

      <div class="done-msg" id="doneMsg">&#10003; Time's up!</div>

      <div class="controls">
        <button class="btn" id="pauseBtn">Pause</button>
        <button class="btn" id="resumeBtn">Resume</button>
        <button class="btn btn-danger" id="resetBtn">Reset</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
